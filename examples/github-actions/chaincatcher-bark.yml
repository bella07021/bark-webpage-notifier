name: Bark Webpage Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: bark-webpage-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore seen state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .bark-state
          key: bark-state-${{ github.run_id }}
          restore-keys: |
            bark-state-

      - name: Run Bark monitor
        env:
          # BEGIN TOPIC SECRETS
          BARK_KEY_BINANCE_CONTRACT: ${{ secrets.BARK_KEY_BINANCE_CONTRACT }}
          BARK_KEY_BINANCE_ALPHA: ${{ secrets.BARK_KEY_BINANCE_ALPHA }}
          # END TOPIC SECRETS
        run: |
          mkdir -p .bark-state
          if [ ! -f bark_topics.json ]; then
            echo "No bark_topics.json found. Run scripts/setup_cloud.sh to configure topics."
            exit 0
          fi
          python3 scripts/bark_web_watch.py --config bark_topics.json --once --init-if-empty

      - name: Save seen state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .bark-state
          key: bark-state-${{ github.run_id }}
